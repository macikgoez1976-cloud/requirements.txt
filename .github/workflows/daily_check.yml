name: Market Monitor
on:
  schedule:
    - cron: '*/15 * * * *' # Läuft alle 15 Minuten
  workflow_dispatch: # Ermöglicht dir, es jederzeit manuell zu starten

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: pip install requests yfinance pandas
      - name: Run script
        run: python monitor.py
